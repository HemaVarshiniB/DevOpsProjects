# Workflow name shown in GitHub Actions tab
name: Upload Website to S3 bucket

# Trigger: Runs automatically when code is pushed to main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    # Runs on a fresh Ubuntu virtual machine
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download repository code into the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Configure AWS credentials using GitHub Secrets
      # This allows GitHub Actions to access your AWS account securely
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Step 3: Sync project3 folder to S3 bucket
      # - Copies files from local repo to S3
      # - --delete removes files from S3 if they no longer exist in repo
      # - --exclude prevents uploading unwanted files like git metadata and markdown docs
      - name: Sync files to S3
        run: |
          aws s3 sync ./project3_DeployStaticPage_s3_CloudFront s3://${{ secrets.AWS_S3_BUCKET }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md"

      # Step 4: Invalidate CloudFront cache
      # CloudFront caches files at edge locations, so updates may not appear immediately
      # This step forces CloudFront to fetch the latest version from S3
      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"